<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FunnyBuddy · 小游戏合集</title>

  <!-- PWA 应用清单 -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#16291f" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="FunnyBuddy 小游戏合集 —— 纯前端、可离线、随时开玩。" />

  <!-- iOS 添加到主屏 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FunnyBuddy" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="css/hub.css" />
</head>
<body>
  <div class="bgfx" aria-hidden="true"></div>

  <main class="hub">
    <header class="hub-header">
      <div class="hub-logo">🎮</div>
      <h1 class="hub-title">FunnyBuddy</h1>
      <p class="hub-sub">小游戏合集 · 纯前端 · 可离线 · 随时开玩</p>
    </header>

    <section id="gameGrid" class="game-grid" aria-label="游戏列表"></section>

    <footer class="hub-footer">
      用 ♥ 打造 · <a href="https://github.com/" target="_blank" rel="noopener">开源于 GitHub</a>
    </footer>
  </main>

  <script src="js/hub.js"></script>

  <!-- PWA Service Worker 注册 -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((e) => {
          console.warn("[PWA] service worker 注册失败：", e);
        });
      });
    }
  </script>
</body>
</html>
