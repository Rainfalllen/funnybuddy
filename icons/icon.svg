<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8a52d8"/>
      <stop offset="60%" stop-color="#3a1f6b"/>
      <stop offset="100%" stop-color="#160b2a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe98a"/>
      <stop offset="100%" stop-color="#e0a82a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角底板 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" stroke="url(#gold)" stroke-width="8"/>

  <!-- 牌形 -->
  <rect x="120" y="96" width="272" height="360" rx="32" ry="32"
        fill="#fbfaf5" stroke="#ffd54a" stroke-width="6"/>

  <!-- 小丑表情 -->
  <text x="256" y="290" font-family="Segoe UI Emoji, Apple Color Emoji, system-ui, sans-serif"
        font-size="180" text-anchor="middle" filter="url(#glow)">🤡</text>

  <!-- 角标点数 -->
  <text x="156" y="146" font-family="Arial, sans-serif" font-size="42"
        font-weight="900" fill="#e44b4b" text-anchor="middle">J</text>
  <text x="156" y="186" font-family="Arial, sans-serif" font-size="36"
        fill="#e44b4b" text-anchor="middle">♠</text>
  <text x="356" y="436" font-family="Arial, sans-serif" font-size="42"
        font-weight="900" fill="#e44b4b" text-anchor="middle" transform="rotate(180 356 420)">J</text>
  <text x="356" y="396" font-family="Arial, sans-serif" font-size="36"
        fill="#e44b4b" text-anchor="middle" transform="rotate(180 356 380)">♠</text>

  <!-- 顶部闪光星 -->
  <text x="430" y="80" font-family="Arial, sans-serif" font-size="48" fill="#ffd54a" filter="url(#glow)">✦</text>
</svg>
