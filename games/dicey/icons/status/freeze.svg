<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fBg" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#0e2738"/><stop offset="1" stop-color="#050d14"/>
    </radialGradient>
    <linearGradient id="fS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6f3ff"/><stop offset="1" stop-color="#58c8f0"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#fBg)" stroke="#58c8f0" stroke-width="2" stroke-opacity=".5"/>
